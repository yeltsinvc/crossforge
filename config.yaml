# CrossForge Configuration
# Dual-agent orchestration with shared skills

agents:
  claude:
    command: "claude"
    model: "claude-opus-4-6"       # Claude Opus 4.6 (highest capability)
    max_turns: 10                  # Max conversation turns per execution
    timeout: 600                   # Timeout in seconds

  codex:
    command: "codex"
    model: "gpt-5.4"              # GPT-5.4 (highest capability)
    timeout: 600

# Directories
queue_dir: "queue"
reviews_dir: "reviews"
skills_dir: "skills"

# Orchestrator settings
orchestrator:
  default_first_agent: "claude"     # Which agent executes first by default
  max_rounds: 1                     # Default number of execute-review rounds
  min_confidence_for_skill: 0.3     # Minimum confidence to keep a skill active
  deprecation_threshold: 0.2        # Below this, skills get archived
